<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>clatter</title>
    <link rel="stylesheet" href="../node_modules/@xterm/xterm/css/xterm.css" />
    <link rel="stylesheet" href="./themes/base.css" />
    <style>
      :root {
        color-scheme: var(--color-scheme);
      }

      html,
      body {
        margin: 0;
        width: 100%;
        height: 100%;
        background: var(--bg-app);
        color: var(--fg-primary);
        font-family: var(--font-ui);
      }

      body {
        min-height: 100dvh;
        overflow: hidden;
      }

      button {
        font: inherit;
      }

      #app {
        display: flex;
        flex-direction: column;
        height: 100dvh;
        background: var(--bg-app);
      }

      .tab-bar {
        display: flex;
        align-items: stretch;
        height: 36px;
        background: var(--bg-surface);
        border-bottom: 1px solid var(--border);
        padding: 0 8px;
        padding-right: 140px; /* Space for window controls on Windows */
        gap: 8px;
        flex-shrink: 0;
        -webkit-app-region: drag;
      }

      .tab-item {
        display: flex;
        align-items: center;
        min-width: 0;
        -webkit-app-region: no-drag;
      }

      .tab-button {
        height: 36px;
        padding: 0 16px;
        background: transparent;
        border: none;
        color: var(--fg-muted);
        cursor: pointer;
        font-size: var(--font-size-chrome);
        font-family: var(--font-display);
        border-bottom: 2px solid transparent;
      }

      .tab-button.active {
        color: var(--accent);
        border-bottom-color: var(--accent);
      }

      .pop-out-button {
        width: 20px;
        height: 20px;
        margin-left: 4px;
        padding: 0;
        border: none;
        border-radius: var(--radius);
        background: transparent;
        color: var(--fg-muted);
        cursor: pointer;
        opacity: 0.5;
      }

      .pop-out-button:hover {
        opacity: 1;
        color: var(--fg-primary);
      }

      .content-area {
        flex: 1;
        overflow: hidden;
        position: relative;
        background: var(--bg-app);
      }

      .chat-shell {
        display: flex;
        height: 100%;
        min-height: 0;
      }

      .chat-primary {
        flex: 1;
        min-width: 0;
        min-height: 0;
      }

      #chat-webview,
      #browser-webview {
        width: 100%;
        height: 100%;
        border: none;
      }

      .browser-pane {
        width: min(44vw, 540px);
        min-width: 320px;
        max-width: 50%;
        display: flex;
        flex-direction: column;
        min-height: 0;
        background: var(--bg-deep);
        border-left: 1px solid var(--border);
      }

      .browser-pane[hidden] {
        display: none;
      }

      .browser-pane-header {
        display: flex;
        align-items: center;
        gap: 10px;
        padding: 10px 12px;
        border-bottom: 1px solid var(--border);
        background: var(--bg-deep);
      }

      .browser-pane-copy {
        flex: 1;
        min-width: 0;
      }

      .browser-pane-title {
        display: block;
        font-size: var(--font-size-panel-title);
        font-family: var(--font-display);
        font-weight: 600;
        color: var(--fg-primary);
      }

      .browser-pane-meta,
      .browser-pane-url {
        display: block;
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
      }

      .browser-pane-meta {
        margin-top: 2px;
        font-size: var(--font-size-caption);
        color: var(--fg-muted);
      }

      .browser-pane-url {
        margin-top: 4px;
        font-size: var(--font-size-caption);
        color: var(--fg-secondary);
        font-family: var(--font-mono);
      }

      .browser-pane-actions {
        display: flex;
        align-items: center;
        gap: 8px;
      }

      .browser-pane-button {
        padding: 6px 10px;
        border: 1px solid var(--border);
        border-radius: var(--radius-lg);
        background: var(--bg-elevated);
        color: var(--fg-secondary);
        cursor: pointer;
        font-size: var(--font-size-chrome);
      }

      .browser-pane-button:hover:not(:disabled) {
        border-color: var(--accent);
        color: var(--control-hover-fg);
      }

      .browser-pane-button:disabled {
        opacity: 0.45;
        cursor: not-allowed;
      }

      .browser-pane-surface {
        flex: 1;
        min-height: 0;
      }

      #ports-container {
        position: absolute;
        inset: 0;
        overflow: auto;
        background: var(--bg-app);
      }

      webview[hidden],
      #ports-container[hidden],
      #terminals-container[hidden] {
        display: none;
      }

      #terminals-container {
        position: absolute;
        inset: 0;
        display: flex;
        flex-direction: column;
        background: var(--bg-app);
      }

      /* --- Quick Launch Bar --- */
      #quick-launch-bar {
        display: flex;
        align-items: center;
        gap: 8px;
        padding: 6px 8px;
        background: var(--bg-sunken);
        border-bottom: 1px solid var(--border);
        flex-shrink: 0;
      }
      .quick-launch-folder {
        padding: 3px 10px;
        font-size: var(--font-size-chrome);
        background: var(--bg-elevated);
        color: var(--fg-muted);
        border: 1px solid var(--border);
        border-radius: var(--radius);
        cursor: pointer;
        font-family: inherit;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
        max-width: 150px;
        transition: all 0.2s;
      }
      .quick-launch-folder:hover {
        background: var(--border-strong);
        color: var(--fg-primary);
      }
      .quick-launch-folder.active {
        color: var(--fg-primary);
        background: var(--accent-subtle);
        border-color: var(--accent);
      }
      .quick-launch-folder:disabled {
        opacity: 0.45;
        cursor: not-allowed;
      }
      .quick-launch-select {
        min-width: 180px;
        max-width: 280px;
        padding: 3px 10px;
        font-size: var(--font-size-chrome);
        background: var(--bg-elevated);
        color: var(--fg-primary);
        border: 1px solid var(--border);
        border-radius: var(--radius);
        font-family: inherit;
        outline: none;
      }
      .quick-launch-select:focus {
        border-color: var(--accent);
      }
      .quick-launch-select:disabled {
        color: var(--fg-dim);
        cursor: not-allowed;
      }
      .quick-launch-agent-btn {
        width: 24px;
        height: 24px;
        padding: 0;
        font-size: var(--font-size-chrome);
        font-weight: 700;
        background: var(--bg-elevated);
        color: var(--fg-primary);
        border: 1px solid var(--border);
        border-radius: var(--radius);
        cursor: pointer;
        transition: all 0.2s;
      }
      .quick-launch-agent-btn:hover {
        background: var(--border-strong);
        border-color: var(--accent);
      }
      .quick-launch-divider {
        width: 1px;
        height: 20px;
        background: var(--border-strong);
        margin: 0 4px;
      }
      .quick-launch-perms {
        display: flex;
        align-items: center;
        gap: 6px;
        font-size: var(--font-size-caption);
        color: var(--fg-muted);
        cursor: pointer;
      }

      .terminals-wrapper {
        flex: 1;
        min-height: 0;
        display: flex;
        flex-direction: column;
        position: relative;
        overflow: hidden;
      }

      .terminals-wrapper.grid-layout {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(400px, 1fr));
        grid-auto-rows: minmax(300px, 1fr);
        gap: 2px;
        background: var(--border); /* Grid lines */
        overflow: auto;
      }

      .terminals-wrapper.grid-layout .terminal-surface {
        display: block !important;
        background: var(--bg-app);
        border: 2px solid transparent;
        transition: border-color 0.2s;
      }

      .terminals-wrapper.grid-layout .terminal-surface.active {
        border-color: var(--accent);
        z-index: 10;
      }

      /* --- Floating Mode --- */
      .terminals-wrapper.float-layout .terminal-instance-wrapper {
        position: absolute;
        box-shadow: var(--shadow-float);
        border: 1px solid var(--border);
        transition:
          border-color 0.2s,
          box-shadow 0.2s;
        display: flex !important; /* Override other display styles */
        flex-direction: column;
      }
      .terminals-wrapper.float-layout .terminal-instance-wrapper.active {
        border-color: var(--accent);
        box-shadow: var(--panel-shadow-strong);
        z-index: 100 !important; /* Ensure active is on top */
      }
      .terminals-wrapper.float-layout .terminal-toolbar {
        cursor: move;
      }
      .terminals-wrapper.float-layout .macro-bar,
      .terminals-wrapper.float-layout .terminal-surface {
        display: flex !important;
      }

      .resize-handle {
        position: absolute;
        width: 10px;
        height: 10px;
        background: transparent;
        z-index: 101;
      }
      .resize-handle.bottom-right {
        bottom: 0;
        right: 0;
        cursor: nwse-resize;
      }

      /* --- Macro Bar --- */
      .terminal-macro-bar {
        display: flex;
        gap: 6px;
        padding: 4px 8px;
        background: var(--bg-surface);
        border-bottom: 1px solid var(--border);
        flex-shrink: 0;
      }

      .macro-btn {
        padding: 2px 8px;
        font-size: var(--font-size-chrome);
        background: var(--bg-elevated);
        color: var(--fg-primary);
        border: 1px solid transparent;
        border-radius: var(--radius);
        cursor: pointer;
        font-family: inherit;
        transition: all 0.2s;
      }

      .macro-btn:hover {
        background: var(--border-strong);
        border-color: var(--accent);
      }

      .macro-btn.blue {
        border-left: 2px solid var(--accent-info);
      }
      .macro-btn.green {
        border-left: 2px solid var(--accent-success);
      }
      .macro-btn.red {
        border-left: 2px solid var(--accent-danger);
      }

      /* Retro chrome button styles (source: design spec) */
      .macro-btn.btn-pixel {
        border: 2px solid currentColor;
        border-radius: 0;
        box-shadow:
          inset -2px -2px 0 var(--pixel-shadow-dark),
          inset 2px 2px 0 var(--pixel-shadow-light);
        text-transform: uppercase;
        font-size: 11px;
        letter-spacing: 0.5px;
      }

      .macro-btn.btn-bevel {
        border: none;
        border-radius: 0;
        background: var(--bevel-bg);
        color: var(--bevel-fg);
        box-shadow:
          inset -1px -1px 0 var(--bevel-shadow-dark),
          inset 1px 1px 0 var(--bevel-shadow-light),
          inset -2px -2px 0 var(--bevel-shadow-darker),
          inset 2px 2px 0 var(--bevel-shadow-lighter);
        font-size: 11px;
      }
      .macro-btn.btn-bevel:hover {
        background: var(--bevel-bg-hover);
      }
      .macro-btn.btn-bevel:active {
        box-shadow:
          inset 1px 1px 0 var(--bevel-shadow-dark),
          inset -1px -1px 0 var(--bevel-shadow-light),
          inset 2px 2px 0 var(--bevel-shadow-darker),
          inset -2px -2px 0 var(--bevel-shadow-lighter);
      }

      .macro-btn.btn-vector {
        border: 1px solid currentColor;
        border-radius: 2px;
        background: transparent;
        box-shadow: 0 0 4px currentColor;
        transition: box-shadow 0.2s;
      }
      .macro-btn.btn-vector:hover {
        box-shadow:
          0 0 8px currentColor,
          0 0 2px currentColor inset;
      }

      /* --- Command Arsenal Sidebar --- */
      .terminals-main {
        flex: 1;
        display: flex;
        min-height: 0;
      }

      .arsenal-sidebar {
        width: 180px;
        background: var(--bg-deep);
        border-left: 1px solid var(--border);
        display: flex;
        flex-direction: column;
        overflow: hidden;
        transition: width 0.3s;
      }

      .arsenal-sidebar.collapsed {
        width: 0;
        border-left: none;
      }

      .arsenal-header {
        padding: 8px 12px;
        font-size: var(--font-size-panel-title);
        font-family: var(--font-display);
        font-weight: 700;
        text-transform: uppercase;
        color: var(--fg-secondary);
        background: var(--bg-elevated);
        border-bottom: 1px solid var(--border);
        display: flex;
        justify-content: space-between;
        align-items: center;
      }

      .arsenal-content {
        flex: 1;
        overflow-y: auto;
        padding: 8px 0;
      }

      .arsenal-category {
        margin-bottom: 12px;
      }

      .arsenal-cat-title {
        padding: 4px 12px;
        font-size: var(--font-size-caption);
        color: var(--fg-dim);
        font-weight: 600;
        letter-spacing: 0.05em;
      }

      .arsenal-item {
        display: block;
        width: 100%;
        padding: 6px 12px;
        text-align: left;
        background: transparent;
        border: none;
        color: var(--fg-primary);
        font-size: var(--font-size-chrome);
        cursor: pointer;
        font-family: inherit;
      }

      .arsenal-item:hover {
        background: var(--accent-subtle);
        color: var(--fg-primary);
      }

      .terminal-settings-toggle {
        display: flex;
        align-items: center;
        justify-content: center;
        width: 32px;
        background: transparent;
        border: none;
        color: var(--fg-dim);
        cursor: pointer;
        flex-shrink: 0;
      }

      .terminal-settings-toggle:hover {
        color: var(--accent);
      }
      .terminal-settings-toggle.active {
        color: var(--accent);
      }

      .terminals-tab-strip {
        display: flex;
        align-items: stretch;
        height: 32px;
        background: var(--bg-surface);
        border-bottom: 1px solid var(--border);
        padding: 0 8px;
        gap: 2px;
        flex-shrink: 0;
        overflow-x: auto;
      }

      .terminal-tab {
        display: flex;
        align-items: center;
        gap: 6px;
        padding: 0 12px;
        background: transparent;
        border: none;
        color: var(--fg-muted);
        font-size: var(--font-size-chrome);
        font-family: var(--font-display);
        cursor: pointer;
        border-bottom: 2px solid transparent;
        white-space: nowrap;
      }

      .terminal-tab.active {
        color: var(--accent);
        border-bottom-color: var(--accent);
      }

      .terminal-tab:hover:not(.active) {
        color: var(--fg-secondary);
      }

      .terminal-tab-close {
        width: 16px;
        height: 16px;
        padding: 0;
        border: none;
        border-radius: 3px;
        background: transparent;
        color: var(--fg-dim);
        cursor: pointer;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 14px;
        line-height: 1;
        opacity: 0;
      }

      .terminal-tab:hover .terminal-tab-close,
      .terminal-tab.active .terminal-tab-close {
        opacity: 1;
      }

      .terminal-tab-close:hover {
        background: rgba(255, 100, 100, 0.2);
        color: var(--state-danger-fg);
      }

      .terminal-tab-add {
        display: flex;
        align-items: center;
        justify-content: center;
        width: 28px;
        background: transparent;
        border: none;
        color: var(--fg-dim);
        font-size: 18px;
        cursor: pointer;
        flex-shrink: 0;
      }

      .terminal-tab-add:hover {
        color: var(--accent);
      }

      .terminal-layout-toggle {
        display: flex;
        align-items: center;
        justify-content: center;
        width: 32px;
        background: transparent;
        border: none;
        color: var(--fg-dim);
        cursor: pointer;
        flex-shrink: 0;
        margin-left: auto;
      }

      .terminal-layout-toggle:hover {
        color: var(--accent);
      }

      .terminal-shell-menu {
        position: absolute;
        top: 32px;
        background: var(--bg-elevated);
        border: 1px solid var(--border);
        border-radius: var(--radius-lg);
        padding: 4px 0;
        z-index: 100;
        min-width: 160px;
        box-shadow: var(--shadow-menu);
      }

      .terminal-shell-option {
        display: block;
        width: 100%;
        padding: 6px 14px;
        border: none;
        background: transparent;
        color: var(--fg-primary);
        font-size: 13px;
        font-family: inherit;
        text-align: left;
        cursor: pointer;
      }

      .terminal-shell-option:hover {
        background: var(--accent-subtle);
        color: var(--control-hover-fg);
      }

      .terminal-instance-wrapper {
        flex: 1;
        min-height: 0;
        display: flex;
        flex-direction: column;
        background: var(--bg-app);
        border: 2px solid transparent;
        transition: border-color 0.2s;
      }

      .terminal-instance-wrapper.active {
        border-color: var(--accent);
      }

      .terminal-toolbar {
        display: flex;
        align-items: center;
        gap: 8px;
        padding: 4px 12px;
        background: var(--bg-deep);
        border-bottom: 1px solid var(--border);
        flex-shrink: 0;
      }

      .terminal-toolbar-btn {
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 4px 8px;
        background: transparent;
        border: 1px solid var(--border);
        border-radius: var(--radius);
        color: var(--fg-muted);
        font-size: var(--font-size-chrome);
        cursor: pointer;
        font-family: var(--font-display);
        transition: all 0.2s;
      }

      .terminal-toolbar-btn:hover {
        background: var(--accent-hover-bg);
        border-color: var(--accent);
        color: var(--control-hover-fg);
      }

      .terminal-toolbar-btn svg {
        margin-right: 4px;
      }

      .terminal-toolbar-spacer {
        flex: 1;
      }

      .terminal-status {
        font-size: var(--font-size-caption);
        color: var(--fg-faint);
        font-family: var(--font-mono);
      }

      .terminal-surface {
        flex: 1;
        min-height: 0;
        position: relative;
      }

      .terminal-surface .xterm {
        height: 100%;
        padding: 4px;
      }

      .terminal-empty {
        display: flex;
        align-items: center;
        justify-content: center;
        height: 100%;
        color: var(--fg-dim);
        font-size: 14px;
      }

      .terminal-exited-banner {
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 12px;
        padding: 8px 16px;
        background: var(--bg-surface);
        border-top: 1px solid var(--border);
        color: var(--fg-muted);
        font-size: var(--font-size-chrome);
        flex-shrink: 0;
      }

      .terminal-exited-banner button {
        padding: 4px 10px;
        border: 1px solid var(--border);
        border-radius: var(--radius);
        background: var(--bg-elevated);
        color: var(--fg-primary);
        font-size: var(--font-size-chrome);
        cursor: pointer;
        font-family: inherit;
      }

      .terminal-exited-banner button:hover {
        border-color: var(--accent);
      }

      .ports-shell {
        box-sizing: border-box;
        min-height: 100%;
        padding: 20px;
      }

      .ports-lattice {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 20px;
        margin-top: 0;
      }

      .ports-pane {
        min-width: 0;
        overflow: hidden;
      }

      .ports-pane-title {
        margin: 0 0 12px 0;
        font-size: var(--font-size-panel-title);
        font-family: var(--font-display);
        font-weight: 600;
        color: var(--fg-secondary);
        display: flex;
        align-items: center;
        gap: 8px;
      }

      .ports-pane-badge {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        min-width: 20px;
        height: 20px;
        padding: 0 6px;
        border-radius: 10px;
        background: var(--bg-elevated);
        color: var(--fg-secondary);
        font-size: var(--font-size-caption);
        font-weight: 600;
        font-variant-numeric: tabular-nums;
      }

      .ports-pane-badge.user {
        background: color-mix(
          in srgb,
          var(--accent-success) 15%,
          var(--bg-app)
        );
        color: var(--accent-success);
      }

      .user-port-desc {
        display: block;
        font-size: var(--font-size-caption);
        color: var(--fg-secondary);
        margin-top: 2px;
      }

      .user-port-cmdline {
        display: block;
        font-size: var(--font-size-caption);
        color: var(--fg-faint);
        margin-top: 0;
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
        font-family: var(--font-mono);
      }

      .ports-header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
        margin-bottom: 16px;
      }

      .ports-title {
        margin: 0;
        font-size: var(--font-size-title);
        font-family: var(--font-display);
        font-weight: 600;
        color: var(--fg-primary);
      }

      .ports-meta {
        font-size: var(--font-size-chrome);
        color: var(--fg-muted);
        font-variant-numeric: tabular-nums;
      }

      .ports-controls {
        display: flex;
        align-items: center;
        gap: 16px;
      }

      .ports-checkbox-label {
        font-size: var(--font-size-chrome);
        color: var(--fg-secondary);
        cursor: pointer;
        display: flex;
        align-items: center;
        gap: 6px;
        user-select: none;
      }

      .ports-checkbox-label input {
        cursor: pointer;
      }

      .ports-search {
        padding: 7px 12px;
        border: 1px solid var(--border);
        border-radius: var(--radius-lg);
        background: var(--bg-elevated);
        color: var(--fg-primary);
        font-size: var(--font-size-chrome);
        font-family: inherit;
        min-width: 180px;
        outline: none;
      }

      .ports-search:focus {
        border-color: var(--accent);
      }

      .ports-search::placeholder {
        color: var(--fg-dim);
      }

      .ports-filter-select {
        padding: 7px 10px;
        border: 1px solid var(--border);
        border-radius: var(--radius-lg);
        background: var(--bg-elevated);
        color: var(--fg-primary);
        font-size: var(--font-size-chrome);
        font-family: inherit;
        cursor: pointer;
        outline: none;
      }

      .ports-filter-select:focus {
        border-color: var(--accent);
      }

      .ports-empty,
      .ports-notice {
        border: 1px solid var(--border);
        border-radius: var(--radius-xl);
        background: var(--bg-surface);
        padding: 16px;
      }

      .ports-empty {
        color: var(--fg-secondary);
      }

      .ports-empty strong {
        display: block;
        margin-bottom: 6px;
        color: var(--fg-primary);
      }

      .ports-notice {
        margin-bottom: 16px;
        font-size: var(--font-size-chrome);
        color: var(--fg-primary);
      }

      .ports-notice.error {
        border-color: color-mix(in srgb, var(--accent-danger) 40%, transparent);
        color: var(--accent-danger);
      }

      .ports-table-wrap {
        border: 1px solid var(--border);
        border-radius: var(--radius-xl);
        overflow: auto;
        background: var(--bg-surface);
      }

      .ports-table {
        width: 100%;
        min-width: 600px;
        border-collapse: collapse;
        font-size: var(--font-size-chrome);
        font-variant-numeric: tabular-nums;
      }

      .ports-table td {
        overflow-wrap: break-word;
        word-break: break-all;
      }

      .ports-table thead {
        background: var(--bg-deep);
      }

      .ports-table th,
      .ports-table td {
        padding: 4px 8px;
        border-bottom: 1px solid var(--border);
        text-align: left;
        vertical-align: middle;
      }

      .ports-table th {
        color: var(--fg-secondary);
        font-weight: 600;
        font-size: var(--font-size-caption);
        text-transform: uppercase;
        letter-spacing: 0.04em;
        position: sticky;
        top: 0;
        z-index: 1;
      }

      .ports-table th.sortable {
        cursor: pointer;
        user-select: none;
      }

      .ports-table th.sortable:hover {
        color: var(--accent);
        background: var(--bg-surface);
      }

      .ports-table th.sortable::after {
        content: "";
        display: inline-block;
        width: 0;
        height: 0;
        margin-left: 8px;
        vertical-align: middle;
        border-left: 4px solid transparent;
        border-right: 4px solid transparent;
        opacity: 0.3;
      }

      .ports-table th.sortable.asc::after {
        border-bottom: 4px solid currentColor;
        opacity: 1;
      }

      .ports-table th.sortable.desc::after {
        border-top: 4px solid currentColor;
        opacity: 1;
      }

      .ports-table tbody tr:hover {
        background: var(--accent-subtle);
      }

      .ports-table tbody tr:last-child td {
        border-bottom: none;
      }

      .mono {
        font-family: var(--font-mono);
      }

      .muted {
        color: var(--fg-muted);
      }

      .kill-button {
        width: 28px;
        height: 28px;
        min-width: unset;
        padding: 0;
        border: 1px solid
          color-mix(in srgb, var(--accent-danger) 40%, transparent);
        border-radius: var(--radius-lg);
        background: color-mix(in srgb, var(--accent-danger) 10%, var(--bg-app));
        color: var(--state-danger-fg);
        cursor: pointer;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        flex-shrink: 0;
      }

      .kill-button:hover:not(:disabled) {
        border-color: var(--accent);
        color: var(--state-danger-fg-strong);
        background: var(--state-danger-bg-hover);
      }

      .kill-button:disabled {
        cursor: not-allowed;
        opacity: 0.35;
      }

      .browse-button {
        width: 28px;
        height: 28px;
        min-width: unset;
        padding: 0;
        border: 1px solid
          color-mix(in srgb, var(--accent-success) 40%, transparent);
        border-radius: var(--radius-lg);
        background: color-mix(
          in srgb,
          var(--accent-success) 10%,
          var(--bg-app)
        );
        color: var(--state-success-fg);
        cursor: pointer;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        flex-shrink: 0;
      }

      .browse-button:hover:not(:disabled) {
        border-color: var(--accent-success);
        color: var(--state-success-fg-strong);
        background: var(--state-success-bg-hover);
      }

      .browse-button:disabled {
        cursor: not-allowed;
        opacity: 0.35;
      }

      .action-group {
        display: flex;
        gap: 4px;
        align-items: center;
      }

      .ports-table td:last-child {
        padding: 3px 6px;
      }

      .col-resize-handle {
        position: absolute;
        right: 0;
        top: 0;
        bottom: 0;
        width: 5px;
        cursor: col-resize;
        user-select: none;
        z-index: 2;
        border-right: 2px solid transparent;
        transition: border-color 0.1s;
      }

      .col-resize-handle:hover,
      .col-resize-handle.dragging {
        border-color: color-mix(in srgb, var(--accent) 55%, transparent);
      }
    </style>
  </head>
  <body>
    <div id="app">
      <div class="tab-bar" role="tablist" aria-label="Desktop tabs">
        <div class="tab-item">
          <button
            type="button"
            class="tab-button active"
            data-tab="chat"
            role="tab"
            aria-selected="true"
          >
            Chat
          </button>
          <button
            type="button"
            class="pop-out-button"
            data-popout="chat"
            aria-label="Pop out Chat"
            title="Pop out Chat"
          >
            &#8599;
          </button>
        </div>
        <div class="tab-item">
          <button
            type="button"
            class="tab-button"
            data-tab="ports"
            role="tab"
            aria-selected="false"
          >
            Ports
          </button>
          <button
            type="button"
            class="pop-out-button"
            data-popout="ports"
            aria-label="Pop out Ports"
            title="Pop out Ports"
          >
            &#8599;
          </button>
        </div>
        <div class="tab-item">
          <button
            type="button"
            class="tab-button"
            data-tab="terminals"
            role="tab"
            aria-selected="false"
          >
            Terminals
          </button>
          <button
            type="button"
            class="pop-out-button"
            data-popout="terminals"
            aria-label="Pop out Terminals"
            title="Pop out Terminals"
          >
            &#8599;
          </button>
        </div>
      </div>

      <div class="content-area">
        <div id="chat-shell" class="chat-shell">
          <div class="chat-primary">
            <webview
              id="chat-webview"
              src="http://127.0.0.1:39777"
              allowpopups
              partition="persist:agentchattr"
              preload=""
            ></webview>
          </div>
          <aside id="browser-pane" class="browser-pane" hidden>
            <div class="browser-pane-header">
              <div class="browser-pane-copy">
                <span class="browser-pane-title">Browser</span>
                <span id="browser-pane-meta" class="browser-pane-meta"
                  >No page open</span
                >
                <span id="browser-pane-url" class="browser-pane-url"
                  >about:blank</span
                >
              </div>
              <div class="browser-pane-actions">
                <button
                  id="browser-pane-popout"
                  type="button"
                  class="browser-pane-button"
                  aria-label="Pop out browser pane"
                >
                  Pop out
                </button>
                <button
                  id="browser-pane-close"
                  type="button"
                  class="browser-pane-button"
                  aria-label="Close browser pane"
                >
                  Close
                </button>
              </div>
            </div>
            <div class="browser-pane-surface">
              <webview
                id="browser-webview"
                src="about:blank"
                allowpopups
                partition="persist:agentchattr-browser"
              ></webview>
            </div>
          </aside>
        </div>
        <div id="ports-container" hidden></div>
        <div id="terminals-container" hidden>
          <div id="quick-launch-bar"></div>
        </div>
      </div>
    </div>

    <script src="./browser-pane-state.js"></script>
    <script src="./chat-theme-bridge.js"></script>
    <script src="./terminal-presence.js"></script>
    <script src="./terminal-config.js"></script>
    <script src="./themes/themes.bundle.js"></script>
    <script src="./terminals.bundle.js"></script>
    <script src="./bridge-ui.js"></script>
    <script src="./bridge.bundle.js"></script>
    <script src="./renderer.js"></script>
  </body>
</html>
