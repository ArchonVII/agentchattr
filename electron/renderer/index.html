        align-items: center;
        justify-content: center;
        flex-shrink: 0;
      }

      .browse-button:hover:not(:disabled) {
        border-color: #56da77;
        color: #c8ffd3;
        background: #1f3a1f;
      }

      .browse-button:disabled {
        cursor: not-allowed;
        opacity: 0.35;
      }

      .action-group {
        display: flex;
        gap: 4px;
        align-items: center;
      }

      .ports-table td:last-child {
        padding: 3px 6px;
      }

      .col-resize-handle {
        position: absolute;
        right: 0;
        top: 0;
        bottom: 0;
        width: 5px;
        cursor: col-resize;
        user-select: none;
        z-index: 2;
        border-right: 2px solid transparent;
        transition: border-color 0.1s;
      }

      .col-resize-handle:hover,
      .col-resize-handle.dragging {
        border-color: rgba(218, 119, 86, 0.55);
      }
    </style>
  </head>
  <body>
    <div id="app">
      <div class="tab-bar" role="tablist" aria-label="Desktop tabs">
        <div class="tab-item">
          <button
            type="button"
            class="tab-button active"
            data-tab="chat"
            role="tab"
            aria-selected="true"
          >
            Chat
          </button>
          <button
            type="button"
            class="pop-out-button"
            data-popout="chat"
            aria-label="Pop out Chat"
            title="Pop out Chat"
          >
            &#8599;
          </button>
        </div>
        <div class="tab-item">
          <button
            type="button"
            class="tab-button"
            data-tab="ports"
            role="tab"
            aria-selected="false"
          >
            Ports
          </button>
          <button
            type="button"
            class="pop-out-button"
            data-popout="ports"
            aria-label="Pop out Ports"
            title="Pop out Ports"
          >
            &#8599;
          </button>
        </div>
        <div class="tab-item">
          <button
            type="button"
            class="tab-button"
            data-tab="terminals"
            role="tab"
            aria-selected="false"
          >
            Terminals
          </button>
          <button
            type="button"
            class="pop-out-button"
            data-popout="terminals"
            aria-label="Pop out Terminals"
            title="Pop out Terminals"
          >
            &#8599;
          </button>
        </div>
      </div>

      <div class="content-area">
        <div id="chat-shell" class="chat-shell">
          <div class="chat-primary">
            <webview
              id="chat-webview"
              src="http://127.0.0.1:8300"
              allowpopups
              partition="persist:agentchattr"
              preload=""
            ></webview>
          </div>
          <aside id="browser-pane" class="browser-pane" hidden>
            <div class="browser-pane-header">
              <div class="browser-pane-copy">
                <span class="browser-pane-title">Browser</span>
                <span id="browser-pane-meta" class="browser-pane-meta"
                  >No page open</span
                >
                <span id="browser-pane-url" class="browser-pane-url"
                  >about:blank</span
                >
              </div>
              <div class="browser-pane-actions">
                <button
                  id="browser-pane-popout"
                  type="button"
                  class="browser-pane-button"
                  aria-label="Pop out browser pane"
                >
                  Pop out
                </button>
                <button
                  id="browser-pane-close"
                  type="button"
                  class="browser-pane-button"
                  aria-label="Close browser pane"
                >
                  Close
                </button>
              </div>
            </div>
            <div class="browser-pane-surface">
              <webview
                id="browser-webview"
                src="about:blank"
                allowpopups
                partition="persist:agentchattr-browser"
              ></webview>
            </div>
          </aside>
        </div>
        <div id="ports-container" hidden></div>
        <div id="terminals-container" hidden>
          <div id="quick-launch-bar"></div>
        </div>
      </div>
    </div>

    <script src="./browser-pane-state.js"></script>
    <script src="./terminal-presence.js"></script>
    <script src="./terminal-config.js"></script>
    <script src="./terminals.bundle.js"></script>
    <script src="./bridge-ui.js"></script>
    <script src="./bridge.bundle.js"></script>
    <script src="./renderer.js"></script>
  </body>
</html>
